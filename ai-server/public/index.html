<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Chat</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f4f5f7;
        color: #1c1e21;
        height: 100vh;
        display: flex;
      }
      .app {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #fff;
        border-right: 1px solid #e4e6eb;
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid #e4e6eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 { font-size: 16px; margin: 0; }
      header button {
        border: 1px solid #d0d3d9;
        background: #fff;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
      }
      header button:hover { background: #f0f1f3; }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bubble {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: 16px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
      }
      .user {
        align-self: flex-end;
        background: #0084ff;
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .assistant {
        align-self: flex-start;
        background: #e9eaed;
        color: #1c1e21;
        border-bottom-left-radius: 4px;
      }

      /* State updates panel */
      .state {
        width: 400px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #fbfbfd;
      }
      .state header { background: #fbfbfd; }
      .state .status {
        font-size: 12px;
        color: #9aa0a6;
      }
      .state .status.live { color: #0a8f3c; }
      #state-body {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .state-empty { color: #9aa0a6; font-size: 13px; }
      .turn-title {
        font-size: 12px;
        font-weight: 600;
        color: #4b5563;
        border-bottom: 1px dashed #e4e6eb;
        padding-bottom: 4px;
      }
      .turn-title .msg { color: #9aa0a6; font-weight: 400; }
      .turn .steps {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }
      .step {
        border-left: 2px solid #0084ff;
        padding-left: 8px;
        font-size: 12px;
        animation: fade 0.25s ease;
      }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      .step .head { font-weight: 600; color: #1c1e21; }
      .step .scope { color: #9aa0a6; font-weight: 400; }
      .step pre {
        margin: 2px 0 0;
        white-space: pre-wrap;
        font-family: inherit;
        color: #4b5563;
      }

      .quick {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px 14px 0;
      }
      .quick button {
        border: 1px solid #d0d3d9;
        background: #f0f5ff;
        color: #0058b8;
        border-radius: 14px;
        padding: 5px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      .quick button:hover { background: #e2edff; }
      .quick button:disabled { opacity: 0.5; cursor: default; }
      form {
        display: flex;
        gap: 8px;
        padding: 12px 14px;
        border-top: 1px solid #e4e6eb;
      }
      #input {
        flex: 1;
        border: 1px solid #d0d3d9;
        border-radius: 20px;
        padding: 10px 16px;
        font-size: 14px;
        outline: none;
      }
      #input:focus { border-color: #0084ff; }
      #send {
        border: none;
        background: #0084ff;
        color: #fff;
        border-radius: 20px;
        padding: 0 20px;
        font-size: 14px;
        cursor: pointer;
      }
      #send:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Agent Chat</h1>
        <button id="new-chat" type="button">New chat</button>
      </header>
      <div id="messages"></div>
      <div class="quick" id="quick">
        <button type="button" data-msg="What is Swiggy One membership?">FAQ query</button>
        <button type="button" data-msg="My order arrived cold and the items were missing, I want a refund">Complaint</button>
        <button type="button" data-msg="I want to reschedule my delivery to tomorrow evening">Service request</button>
        <button type="button" data-msg="hmm">Ambiguous</button>
      </div>
      <form id="form">
        <input
          id="input"
          autocomplete="off"
          placeholder="Type a message…"
        />
        <button id="send" type="submit">Send</button>
      </form>
    </div>

    <aside class="state">
      <header>
        <h1>🔍 State updates</h1>
        <span class="status" id="state-status">idle</span>
      </header>
      <div id="state-body">
        <div class="state-empty">Agent decisions will appear here as they happen.</div>
      </div>
    </aside>

    <script>
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const newChatBtn = document.getElementById("new-chat");
      const quickEl = document.getElementById("quick");
      const stateBody = document.getElementById("state-body");
      const stateStatus = document.getElementById("state-status");

      let threadId = null;

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function addBubble(text, role) {
        const el = document.createElement("div");
        el.className = "bubble " + role;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return el;
      }

      function setStatus(text, live) {
        stateStatus.textContent = text;
        stateStatus.className = "status" + (live ? " live" : "");
      }

      function startTurn(message) {
        const empty = stateBody.querySelector(".state-empty");
        if (empty) empty.remove();

        const turn = document.createElement("div");
        turn.className = "turn";
        const title = document.createElement("div");
        title.className = "turn-title";
        title.innerHTML =
          "▶ turn · <span class=\"msg\">" + escapeHtml(message) + "</span>";
        const steps = document.createElement("div");
        steps.className = "steps";
        turn.appendChild(title);
        turn.appendChild(steps);
        stateBody.appendChild(turn);
        stateBody.scrollTop = stateBody.scrollHeight;
        return { steps, count: 0 };
      }

      function addStep(turn, s) {
        const step = document.createElement("div");
        step.className = "step";
        const head = document.createElement("div");
        head.className = "head";
        head.innerHTML =
          escapeHtml(s.node) +
          " <span class=\"scope\">· " + escapeHtml(s.scope) + "</span>";
        const pre = document.createElement("pre");
        pre.textContent = s.detail;
        step.appendChild(head);
        step.appendChild(pre);
        turn.steps.appendChild(step);
        turn.count += 1;
        stateBody.scrollTop = stateBody.scrollHeight;
      }

      function resetChat() {
        threadId = null;
        messagesEl.innerHTML = "";
        stateBody.innerHTML =
          '<div class="state-empty">Agent decisions will appear here as they happen.</div>';
        setStatus("idle", false);
        input.focus();
      }

      newChatBtn.addEventListener("click", resetChat);

      function setBusy(busy) {
        input.disabled = busy;
        sendBtn.disabled = busy;
        for (const b of quickEl.querySelectorAll("button")) b.disabled = busy;
      }

      function parseEvent(raw) {
        let event = "message";
        const dataLines = [];
        for (const line of raw.split("\n")) {
          if (line.startsWith("event:")) event = line.slice(6).trim();
          else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
        }
        if (!dataLines.length) return null;
        try {
          return { event, data: JSON.parse(dataLines.join("\n")) };
        } catch (e) {
          return null;
        }
      }

      async function sendMessage(message) {
        message = (message || "").trim();
        if (!message) return;

        addBubble(message, "user");
        input.value = "";
        setBusy(true);
        const turn = startTurn(message);
        setStatus("running…", true);
        let gotMessage = false;

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ threadId, message }),
          });

          if (!res.ok || !res.body) {
            const data = await res.json().catch(() => ({}));
            addBubble(data.error || "Something went wrong.", "assistant");
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            let idx;
            while ((idx = buffer.indexOf("\n\n")) >= 0) {
              const raw = buffer.slice(0, idx);
              buffer = buffer.slice(idx + 2);
              const ev = parseEvent(raw);
              if (!ev) continue;
              if (ev.event === "message") {
                addBubble(ev.data.text || "", "assistant");
                gotMessage = true;
              } else if (ev.event === "trace") {
                addStep(turn, ev.data);
              } else if (ev.event === "done") {
                threadId = ev.data.threadId;
              } else if (ev.event === "error") {
                addBubble(ev.data.error || "Something went wrong.", "assistant");
              }
            }
          }

          if (!gotMessage) addBubble("(no response)", "assistant");
        } catch (err) {
          addBubble("Network error. Please try again.", "assistant");
        } finally {
          setStatus(turn.count + " steps · done", false);
          setBusy(false);
          input.focus();
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        sendMessage(input.value);
      });

      quickEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (btn) sendMessage(btn.dataset.msg);
      });

      input.focus();
    </script>
  </body>
</html>
